<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ديموفر | تصنيف الطلاب</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }, 
                    colors: { primary: '#2563eb', secondary: '#f97316' } 
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-btn {
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            transform: translateX(-4px);
            border-color: #2563eb;
            background: #eff6ff;
        }
        .leaderboard-item {
            transition: all 0.2s ease;
        }
        .leaderboard-item:hover {
            transform: translateX(-4px);
            background: #f8fafc;
        }
        .leaderboard-item.my-row {
            background: #eff6ff;
            border-right: 4px solid #2563eb;
        }
        .search-box {
            transition: all 0.25s ease;
        }
        .search-box:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .medal-icon {
            font-size: 1.4rem;
        }
        .level-badge {
            background: #f1f5f9;
            color: #64748b;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
        }
        .my-badge {
            background: #2563eb;
            color: white;
            font-size: 0.65rem;
            padding: 0.15rem 0.6rem;
            border-radius: 2rem;
        }
        .my-stats-card {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1px solid #bfdbfe;
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- زر العودة -->
    <a href="dashbord.html" class="back-btn inline-flex items-center gap-2 bg-white border border-gray-200 px-5 py-2.5 rounded-full font-semibold text-slate-600 hover:text-primary mb-6 transition shadow-sm">
        <i class="fas fa-arrow-right"></i> العودة للرئيسية
    </a>

    <!-- الهيدر -->
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 text-3xl font-bold text-slate-800">
            <i class="fas fa-trophy text-primary"></i>
            <span>تصنيف الطلاب</span>
        </div>
        <p class="text-slate-500 mt-2 font-semibold">ترتيب الطلاب حسب النقاط - من الأعلى إلى الأقل</p>
    </div>

    <!-- إحصائياتي الشخصية -->
    <div id="myStats" class="my-stats-card rounded-2xl p-5 mb-6 flex flex-wrap items-center justify-between gap-4" style="display: none;">
        <div class="flex items-center gap-3">
            <i class="fas fa-crown text-3xl text-yellow-500"></i>
            <div>
                <div class="text-xs text-slate-500 font-semibold">مركزك</div>
                <div class="text-2xl font-extrabold text-primary" id="myRank">-</div>
            </div>
        </div>
        <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
                <i class="fas fa-star text-yellow-500"></i>
                <span class="font-bold text-slate-700" id="myPoints">0 نقطة</span>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
                <i class="fas fa-chart-line text-primary"></i>
                <span class="font-bold text-slate-700" id="myLevel">مبتدئ</span>
            </div>
        </div>
    </div>

    <!-- بحث -->
    <div class="search-box bg-white rounded-full border border-gray-200 px-6 py-2 flex items-center gap-3 shadow-sm mb-6">
        <i class="fas fa-search text-slate-400"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن طالب بالاسم..." class="flex-1 py-3 outline-none bg-transparent font-cairo text-slate-700" onkeyup="filterLeaderboard()">
    </div>

    <!-- قائمة الترتيب -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="grid grid-cols-[70px,1fr,90px] bg-slate-50 border-b border-gray-200 px-5 py-3 text-sm font-extrabold text-slate-500">
            <div>الترتيب</div>
            <div>الطالب</div>
            <div class="text-left">النقاط</div>
        </div>
        <div id="leaderboardBody">
            <div class="text-center py-12 text-slate-500">
                <i class="fas fa-spinner fa-pulse text-2xl text-primary"></i>
                <p class="mt-3 font-semibold">جاري تحميل الترتيب...</p>
            </div>
        </div>
    </div>

    <!-- إحصائيات عامة -->
    <div id="statsFooter" class="text-center text-sm text-slate-400 mt-4"></div>
</div>

<script>
    // ============================================================
    //  إعدادات Supabase
    // ============================================================
    const SUPABASE_URL = 'https://kuepdppngskwkmhyhohq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1ZXBkcHBuZ3Nrd2ttaHlob2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTUwNzEsImV4cCI6MjA5NTQ5MTA3MX0.USRz4LrPf7bYf5eo6sP5Ay72OiwfcZ2ZpFKFi7lqKQI';
    
    if (typeof supabase === 'undefined') {
        document.getElementById('leaderboardBody').innerHTML = '<div class="text-center text-red-500 py-10">خطأ في تحميل مكتبة Supabase</div>';
        throw new Error('Supabase not loaded');
    }
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let allStudents = [];
    let currentUserId = null;

    // ============================================================
    //  تحميل الترتيب
    // ============================================================
    async function loadLeaderboard() {
        // جلب المستخدم الحالي
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            currentUserId = user.id;
        }

        // جلب جميع الطلاب مرتبين حسب النقاط
        const { data: students, error } = await sb
            .from('profiles')
            .select('id, full_name, points, level')
            .order('points', { ascending: false });

        if (error) {
            console.error('خطأ في جلب البيانات:', error);
            document.getElementById('leaderboardBody').innerHTML = '<div class="text-center text-red-500 py-10">حدث خطأ أثناء تحميل البيانات</div>';
            return;
        }

        if (!students || students.length === 0) {
            document.getElementById('leaderboardBody').innerHTML = '<div class="text-center py-10 text-slate-500">لا يوجد طلاب حتى الآن</div>';
            return;
        }

        allStudents = students;
        renderLeaderboard(students);

        // عرض إحصائياتي الشخصية
        if (user) {
            const myIndex = students.findIndex(s => s.id === user.id);
            if (myIndex !== -1) {
                const myData = students[myIndex];
                document.getElementById('myStats').style.display = 'flex';
                document.getElementById('myRank').textContent = myIndex + 1;
                document.getElementById('myPoints').innerHTML = `${myData.points || 0} نقطة`;
                
                let levelText = myData.level || 'مبتدئ';
                let levelIcon = '';
                if (levelText === 'خبير') levelIcon = '🏅';
                else if (levelText === 'متقدم') levelIcon = '⭐';
                else if (levelText === 'متوسط') levelIcon = '🌟';
                else levelIcon = '✨';
                document.getElementById('myLevel').innerHTML = `${levelIcon} ${levelText}`;
            }
        }

        // إحصائيات عامة
        document.getElementById('statsFooter').innerHTML = `
            📊 إجمالي الطلاب: ${students.length} | 🏆 أعلى نقاط: ${students[0]?.points || 0} نقطة
        `;
    }

    // ============================================================
    //  عرض القائمة
    // ============================================================
    function renderLeaderboard(students) {
        const container = document.getElementById('leaderboardBody');
        
        if (!students || students.length === 0) {
            container.innerHTML = '<div class="text-center py-10 text-slate-500">لا توجد نتائج مطابقة</div>';
            return;
        }

        let html = '';
        students.forEach((student, index) => {
            const rank = index + 1;
            let rankDisplay = '';
            
            if (rank === 1) {
                rankDisplay = `<span class="medal-icon">🥇</span>`;
            } else if (rank === 2) {
                rankDisplay = `<span class="medal-icon">🥈</span>`;
            } else if (rank === 3) {
                rankDisplay = `<span class="medal-icon">🥉</span>`;
            } else {
                rankDisplay = rank;
            }
            
            let levelIcon = '';
            const level = student.level || 'مبتدئ';
            if (level === 'خبير') levelIcon = '🏅';
            else if (level === 'متقدم') levelIcon = '⭐';
            else if (level === 'متوسط') levelIcon = '🌟';
            else levelIcon = '✨';
            
            const isMe = (currentUserId && student.id === currentUserId);
            const myClass = isMe ? 'my-row' : '';
            
            html += `
                <div class="leaderboard-item grid grid-cols-[70px,1fr,90px] items-center px-5 py-3.5 border-b border-gray-100 ${myClass}">
                    <div class="font-bold text-slate-700">${rankDisplay}</div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="font-semibold text-slate-800">${escapeHtml(student.full_name || 'بدون اسم')}</span>
                        <span class="level-badge">${levelIcon} ${escapeHtml(level)}</span>
                        ${isMe ? '<span class="my-badge">أنت</span>' : ''}
                    </div>
                    <div class="text-left font-bold text-yellow-600">⭐ ${student.points || 0}</div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // ============================================================
    //  فلترة البحث
    // ============================================================
    function filterLeaderboard() {
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!searchTerm) {
            renderLeaderboard(allStudents);
            return;
        }
        
        const filtered = allStudents.filter(student => 
            (student.full_name || '').toLowerCase().includes(searchTerm)
        );
        renderLeaderboard(filtered);
    }

    // ============================================================
    //  دوال مساعدة
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ============================================================
    //  التحقق من الجلسة + بدء التشغيل
    // ============================================================
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = "index.html";
            return;
        }
        await loadLeaderboard();
    }

    init();
</script>

</body>
</html>
