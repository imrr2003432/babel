<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study Timer | يوتيوب و مؤقت بنفسجي - أبيض</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a1025, #0a0510);
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 28px;
            backdrop-filter: blur(2px);
        }

        /* البطاقات - خلفية شفافة مع حدود بنفسجية */
        .card {
            background: rgba(25, 15, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(170, 90, 220, 0.35);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .timer-section {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .live-clock {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            text-align: center;
            border-bottom: 2px solid #b67eff;
        }

        .time-digital {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #e0b3ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: monospace;
        }

        .ampm-badge {
            background: #2a1a3a;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #cf9eff;
            margin-right: 12px;
        }

        .date-text {
            color: #d9b8ff;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .timer-main {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            padding: 1.2rem;
        }

        .countdown {
            font-size: 5rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 6px;
            background: linear-gradient(145deg, #ffffff, #d9a7ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 12px #b77eff;
        }

        .minutes-to-go {
            font-size: 1.1rem;
            background: #1a102a80;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            color: #e5c5ff;
            font-weight: 500;
        }

        .timer-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .ctrl-btn {
            background: #2e1a42;
            border: none;
            padding: 10px 18px;
            border-radius: 3rem;
            font-weight: 600;
            color: #f0eaff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .ctrl-btn.primary {
            background: #a259ff;
            color: white;
            box-shadow: 0 4px 12px #a259ff80;
        }

        .ctrl-btn.warning {
            background: #e07c3c;
        }

        .ctrl-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .time-adjust {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        /* مشغل يوتيوب */
        .youtube-player {
            margin-top: 6px;
        }
        .youtube-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            color: #f0e6ff;
            font-weight: 600;
            border-right: 3px solid #b77eff;
            padding-right: 12px;
        }
        .youtube-header i {
            font-size: 1.4rem;
            color: #e64d4d;
        }
        .youtube-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .youtube-input-group input {
            flex: 3;
            background: #120c1c;
            border: 1px solid #553e6e;
            padding: 10px 15px;
            border-radius: 2rem;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }
        .youtube-input-group input:focus {
            border-color: #b77eff;
        }
        .youtube-input-group button {
            background: #a259ff;
            border: none;
            padding: 0 18px;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .youtube-input-group button:hover {
            background: #be7cff;
        }
        .embed-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 1.2rem;
            margin-top: 12px;
            background: #00000055;
        }
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            border: 1px solid #a55eff;
        }
        .youtube-info {
            font-size: 0.7rem;
            color: #c7aaff;
            margin-top: 12px;
            text-align: center;
        }
        .stop-music-btn {
            background: #ef444410;
            border: 1px solid #ef444460;
            border-radius: 3rem;
            padding: 6px 12px;
            color: #ffb3a5;
            font-size: 0.75rem;
            width: auto;
            margin-top: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .stop-music-btn:hover {
            background: #ef444430;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* قائمة المهام */
        .todo-section .todo-list-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .todo-header h3 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f0e6ff;
            border-right: 3px solid #b77eff;
            padding-right: 12px;
        }

        .add-task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .add-task-form input {
            flex: 1;
            background: #120c1c;
            border: 1px solid #553e6e;
            padding: 12px 16px;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            outline: none;
        }

        .add-task-form input:focus {
            border-color: #b77eff;
        }

        .add-task-form button {
            background: #a259ff;
            border: none;
            padding: 0 20px;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .tasks-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 380px;
            overflow-y: auto;
            padding-left: 4px;
        }

        .task-item {
            background: #1f1330aa;
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #7a4faa;
        }

        .task-check {
            width: 22px;
            height: 22px;
            accent-color: #b77eff;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #f5edff;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #b59dd9;
        }

        .delete-task {
            background: transparent;
            border: none;
            color: #ff9e8f;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #ab8bcf;
            border-top: 1px dashed #5e3f82;
            padding-top: 16px;
        }

        @media (max-width: 850px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .countdown {
                font-size: 3.5rem;
            }
        }

        .tasks-list::-webkit-scrollbar {
            width: 5px;
        }
        .tasks-list::-webkit-scrollbar-track {
            background: #2a1a3a;
            border-radius: 10px;
        }
        .tasks-list::-webkit-scrollbar-thumb {
            background: #b77eff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- العمود الأيمن: المؤقت + اليوتيوب -->
    <div class="timer-section">
        <div class="card">
            <div class="live-clock">
                <div>
                    <span class="time-digital" id="clockDisplay">--:--:--</span>
                    <span class="ampm-badge" id="ampmIndicator">AM</span>
                </div>
                <div class="date-text" id="dateDisplay"></div>
            </div>
        </div>

        <div class="card">
            <div class="timer-main">
                <div class="countdown" id="timerDisplay">60:00</div>
                <div class="minutes-to-go" id="minutesToGoText">60 Minutes to go</div>
                <div class="timer-controls">
                    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> بدء</button>
                    <button class="ctrl-btn" id="pauseBtn"><i class="fas fa-pause"></i> إيقاف</button>
                    <button class="ctrl-btn warning" id="resetBtn"><i class="fas fa-undo-alt"></i> إعادة</button>
                </div>
                <div class="time-adjust">
                    <button class="ctrl-btn" id="minusFiveBtn"><i class="fas fa-minus-circle"></i> -5 دقائق</button>
                    <button class="ctrl-btn" id="plusFiveBtn"><i class="fas fa-plus-circle"></i> +5 دقائق</button>
                </div>
            </div>
        </div>

        <!-- قسم مشغل يوتيوب (رابط + تشغيل موسيقى / فيديو) -->
        <div class="card youtube-player">
            <div class="youtube-header">
                <i class="fab fa-youtube"></i>
                <span>مشغل يوتيوب - تشغيل موسيقى للدراسة</span>
            </div>
            <div class="youtube-input-group">
                <input type="text" id="youtubeUrlInput" placeholder="ألصق رابط يوتيوب هنا ... (مثال: https://youtu.be/... أو https://www.youtube.com/watch?v=...)" dir="ltr">
                <button id="loadVideoBtn"><i class="fas fa-play-circle"></i> تشغيل</button>
            </div>
            <div class="flex-between">
                <button id="stopYoutubeBtn" class="stop-music-btn"><i class="fas fa-stop-circle"></i> إيقاف الفيديو</button>
                <span style="font-size:0.7rem; color:#bfa0ff;"><i class="fas fa-info-circle"></i> يدعم الروابط المعتادة</span>
            </div>
            <div id="youtubeEmbedContainer" class="embed-container">
                <iframe id="youtubeIframe" src="" title="YouTube player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="youtube-info">
                💜 استخدم الموسيقى الهادئة أو أصوات الطبيعة من يوتيوب لخلق جو مركّز
            </div>
        </div>
    </div>

    <!-- العمود الأيسر: قائمة المهام -->
    <div class="card todo-section">
        <div class="todo-list-container">
            <div class="todo-header">
                <h3><i class="fas fa-check-circle"></i> قائمة المهام</h3>
            </div>
            <div class="add-task-form">
                <input type="text" id="newTaskInput" placeholder="أضف مهمة جديدة ..." autocomplete="off">
                <button id="addTaskBtn"><i class="fas fa-plus"></i> أضف</button>
            </div>
            <ul class="tasks-list" id="tasksList">
                <!-- المهام سيتم عرضها هنا عن طريق JS -->
            </ul>
            <div class="footer-note">
                <i class="fas fa-check-square"></i> اضغط على المربع لإكمال المهمة | <i class="fas fa-trash-alt"></i> حذف
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 1. TIMER LOGIC ----------
    let remainingSeconds = 60 * 60;
    let timerInterval = null;
    let isTimerRunning = false;
    
    const timerDisplayEl = document.getElementById('timerDisplay');
    const minutesToGoSpan = document.getElementById('minutesToGoText');

    function updateTimerUI() {
        const mins = Math.floor(remainingSeconds / 60);
        const secs = remainingSeconds % 60;
        timerDisplayEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        const minsLeft = Math.floor(remainingSeconds / 60);
        minutesToGoSpan.textContent = `${minsLeft} ${minsLeft === 1 ? 'Minute' : 'Minutes'} to go`;
        if (remainingSeconds <= 0) minutesToGoSpan.textContent = `0 Minutes to go - انتهى الوقت!`;
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        if (remainingSeconds <= 0) return;
        isTimerRunning = true;
        timerInterval = setInterval(() => {
            if (remainingSeconds > 0) {
                remainingSeconds--;
                updateTimerUI();
                if (remainingSeconds === 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    isTimerRunning = false;
                    updateTimerUI();
                    if (window.navigator.vibrate) window.navigator.vibrate(200);
                    alert("⏰ انتهت الجلسة الدراسية! أحسنت، خذ قسطاً من الراحة.");
                }
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                isTimerRunning = false;
            }
        }, 1000);
    }

    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            isTimerRunning = false;
        }
    }

    function resetTimer() {
        pauseTimer();
        remainingSeconds = 60 * 60;
        updateTimerUI();
        isTimerRunning = false;
    }

    function addMinutes(minutes) {
        let newSeconds = remainingSeconds + (minutes * 60);
        if (newSeconds < 0) newSeconds = 0;
        if (newSeconds > 36000) newSeconds = 36000;
        remainingSeconds = newSeconds;
        updateTimerUI();
    }

    document.getElementById('startBtn').addEventListener('click', startTimer);
    document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);
    document.getElementById('minusFiveBtn').addEventListener('click', () => addMinutes(-5));
    document.getElementById('plusFiveBtn').addEventListener('click', () => addMinutes(5));
    updateTimerUI();

    // ---------- 2. الساعة الحية ----------
    function updateLiveClock() {
        const now = new Date();
        let hours24 = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        let ampm = hours24 >= 12 ? 'PM' : 'AM';
        const timeStr24 = `${hours24.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        document.getElementById('clockDisplay').innerText = timeStr24;
        document.getElementById('ampmIndicator').innerText = ampm;
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('dateDisplay').innerText = now.toLocaleDateString('ar-EG', options);
    }
    updateLiveClock();
    setInterval(updateLiveClock, 1000);

    // ---------- 3. قائمة المهام (مع الحفظ التلقائي في localStorage) ----------
    let tasks = [];

    // مفتاح التخزين المحلي
    const STORAGE_KEY = 'study_timer_tasks';

    // دالة لحفظ المهام في localStorage
    function saveTasksToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // دالة لتحميل المهام من localStorage، وإذا لم توجد تُنشئ المهام الافتراضية
    function loadTasksFromLocalStorage() {
        const storedTasks = localStorage.getItem(STORAGE_KEY);
        if (storedTasks) {
            tasks = JSON.parse(storedTasks);
        } else {
            // المهام الافتراضية (ثلاث مهام دراسية)
            tasks = [
                { id: Date.now() + 1, text: "مراجعة الملاحظات (Review notes)", completed: false },
                { id: Date.now() + 2, text: "حل المسائل التدريبية (Do practice problems)", completed: false },
                { id: Date.now() + 3, text: "العمل على النقاط الضعيفة (Work on weak points)", completed: false }
            ];
            saveTasksToLocalStorage(); // حفظها لأول مرة
        }
    }

    const tasksListEl = document.getElementById('tasksList');
    const newTaskInput = document.getElementById('newTaskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');

    // عرض المهام مع ربط الأحداث (checkbox / حذف) وفي النهاية حفظ تلقائي
    function renderTasks() {
        tasksListEl.innerHTML = '';
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = 'task-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'task-check';
            checkbox.checked = task.completed;
            // حدث تغيير الحالة (إكمال أو إلغاء إكمال)
            checkbox.addEventListener('change', (e) => {
                task.completed = e.target.checked;
                saveTasksToLocalStorage();   // حفظ بعد التعديل
                renderTasks();               // إعادة التصيير (لتحديث مظهر النص المشطوب)
            });
            
            const taskSpan = document.createElement('span');
            taskSpan.className = `task-text ${task.completed ? 'completed' : ''}`;
            taskSpan.innerText = task.text;
            
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            deleteBtn.className = 'delete-task';
            deleteBtn.addEventListener('click', () => {
                tasks = tasks.filter(t => t.id !== task.id);
                saveTasksToLocalStorage();   // حفظ بعد الحذف
                renderTasks();
            });
            
            li.appendChild(checkbox);
            li.appendChild(taskSpan);
            li.appendChild(deleteBtn);
            tasksListEl.appendChild(li);
        });
    }

    // إضافة مهمة جديدة
    function addNewTask() {
        const rawText = newTaskInput.value.trim();
        if (rawText === "") {
            alert("الرجاء كتابة مهمة جديدة.");
            return;
        }
        const newTask = {
            id: Date.now(),
            text: rawText,
            completed: false
        };
        tasks.push(newTask);
        saveTasksToLocalStorage();   // حفظ بعد الإضافة
        renderTasks();
        newTaskInput.value = "";
        newTaskInput.focus();
    }

    // تحميل البيانات الأولية ثم عرض المهام
    loadTasksFromLocalStorage();
    renderTasks();

    // ربط أزرار الإضافة
    addTaskBtn.addEventListener('click', addNewTask);
    newTaskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewTask(); });

    // ---------- 4. يوتيوب: تحويل الرابط وتشغيل iframe ----------
    const youtubeUrlInput = document.getElementById('youtubeUrlInput');
    const loadVideoBtn = document.getElementById('loadVideoBtn');
    const youtubeIframe = document.getElementById('youtubeIframe');
    const stopYoutubeBtn = document.getElementById('stopYoutubeBtn');

    // استخراج معرف الفيديو من رابط يوتيوب
    function extractVideoId(url) {
        if (!url) return null;
        let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        let match = url.match(regExp);
        if (match && match[2].length === 11) {
            return match[2];
        }
        try {
            let urlParams = new URLSearchParams(new URL(url).search);
            if (urlParams.has('v')) {
                return urlParams.get('v');
            }
        } catch(e) {}
        if (url.includes('youtube.com/embed/')) {
            let parts = url.split('/embed/');
            if (parts[1] && parts[1].length >= 11) return parts[1].substring(0, 11);
        }
        return null;
    }

    function loadYouTubeVideo() {
        let rawUrl = youtubeUrlInput.value.trim();
        if (!rawUrl) {
            alert("الرجاء إدخال رابط يوتيوب صالح");
            return;
        }
        let videoId = extractVideoId(rawUrl);
        if (!videoId) {
            if (rawUrl.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(rawUrl)) {
                videoId = rawUrl;
            } else {
                alert("لم نتمكن من استخراج معرف الفيديو. تأكد من الرابط (مثال: https://youtu.be/abcd1234... أو https://www.youtube.com/watch?v=abcd1234)");
                return;
            }
        }
        const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&controls=1&loop=0&enablejsapi=1`;
        youtubeIframe.src = embedUrl;
        youtubeUrlInput.value = `https://youtu.be/${videoId}`;
    }

    function stopYouTube() {
        youtubeIframe.src = "";
        youtubeIframe.src = "about:blank";
    }

    loadVideoBtn.addEventListener('click', loadYouTubeVideo);
    stopYoutubeBtn.addEventListener('click', stopYouTube);
    youtubeUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadYouTubeVideo();
    });

    // تذييل اختياري
    const footerSignature = document.createElement('div');
    footerSignature.className = 'footer-note';
    footerSignature.style.marginTop = '12px';
    footerSignature.style.fontSize = '0.7rem';
    footerSignature.style.textAlign = 'center';
    footerSignature.innerHTML = '💜 JoeBizzaro · wish on a star · Study with YouTube music 💜';
    const todoFooter = document.querySelector('.todo-section .footer-note');
    if (todoFooter) {
        todoFooter.insertAdjacentElement('afterend', footerSignature);
    } else {
        document.querySelector('.todo-section')?.appendChild(footerSignature);
    }
</script>
</body>
</html>
