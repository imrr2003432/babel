<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة الأدمن المتكاملة - المحاضرات والإعلانات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f0f9ff; padding: 30px 20px; direction: rtl; }
        .container { max-width: 1300px; margin: auto; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: #1e293b; margin-bottom: 20px; border-right: 5px solid #3b82f6; padding-right: 15px; display: flex; align-items: center; gap: 10px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; align-items: center; }
        input, select, textarea { padding: 12px; border-radius: 40px; border: 1px solid #cbd5e1; flex: 1; font-family: inherit; }
        textarea { border-radius: 20px; resize: vertical; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2563eb; transform: scale(0.97); }
        .delete-btn { background: #ef4444; }
        .delete-btn:hover { background: #dc2626; }
        .toggle-btn { background: #f59e0b; }
        .toggle-btn:hover { background: #d97706; }
        .item-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .item { background: #f8fafc; padding: 12px 20px; border-radius: 60px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .teacher-avatar-preview { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
        .preview-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .announcement-thumb { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; background: #cbd5e1; }
        .badge { background: #10b981; color: white; font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; }
        .badge-hidden { background: #94a3b8; }
        @media (max-width: 640px) { .item { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
<div class="container">
    <h1 style="margin-bottom: 25px;"><i class="fas fa-shield-alt"></i> لوحة الأدمن المتكاملة</h1>
    
    <!-- ========== قسم إدارة الإعلانات ========== -->
    <div class="card">
        <h2><i class="fas fa-bullhorn"></i> إدارة الإعلانات</h2>
        <div class="form-row">
            <input type="text" id="annTitle" placeholder="عنوان الإعلان (مثال: تحديث المنصة)">
            <textarea id="annContent" placeholder="نص الإعلان التفصيلي" rows="2"></textarea>
        </div>
        <div class="form-row">
            <input type="url" id="annImageUrl" placeholder="رابط الصورة (اختياري)">
            <button id="uploadAnnImageBtn" style="background:#10b981;"><i class="fas fa-cloud-upload-alt"></i> رفع صورة</button>
            <input type="file" id="annImageFile" accept="image/*" style="display: none;">
        </div>
        <div class="form-row">
            <label><input type="checkbox" id="annIsVisible" checked> مرئي للطلاب</label>
            <button id="addAnnouncementBtn" style="background:#3b82f6;">➕ نشر إعلان</button>
        </div>
        <div id="announcementsList" class="item-list">
            <div>جاري تحميل الإعلانات...</div>
        </div>
    </div>

    <!-- قسم المدرسين -->
    <div class="card">
        <h2><i class="fas fa-user-tie"></i> إدارة المدرسين</h2>
        <div class="form-row">
            <input type="text" id="teacherName" placeholder="اسم المدرس">
            <textarea id="teacherBio" placeholder="نبذة قصيرة" rows="1"></textarea>
        </div>
        <div class="form-row image-upload">
            <input type="file" id="teacherAvatarFile" accept="image/*">
            <img id="avatarPreview" class="preview-img" src="" style="display: none;">
            <button id="uploadAvatarBtn" style="background: #10b981;">رفع صورة المدرس</button>
        </div>
        <div class="form-row">
            <button id="addTeacherBtn">➕ إضافة مدرس</button>
        </div>
        <div id="teachersList" class="item-list"></div>
    </div>

    <!-- قسم الفصول -->
    <div class="card">
        <h2><i class="fas fa-layer-group"></i> إدارة الفصول</h2>
        <div class="form-row">
            <select id="teacherSelectForClass"></select>
            <input type="text" id="className" placeholder="اسم الفصل (مثال: الفصل الأول)">
            <input type="number" id="classOrder" placeholder="ترتيب" value="0">
            <button id="addClassBtn">📚 إضافة فصل</button>
        </div>
        <div id="classesList" class="item-list"></div>
    </div>

    <!-- قسم المحاضرات -->
    <div class="card">
        <h2><i class="fas fa-video"></i> إدارة المحاضرات</h2>
        <div class="form-row">
            <select id="teacherSelectForLecture"></select>
            <select id="classSelectForLecture"></select>
        </div>
        <div class="form-row">
            <input type="text" id="lectureTitle" placeholder="عنوان المحاضرة">
            <input type="url" id="lectureUrl" placeholder="رابط يوتيوب">
            <button id="addLectureBtn">🎥 إضافة محاضرة</button>
        </div>
        <div id="lecturesList" class="item-list"></div>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://kuepdppngskwkmhyhohq.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1ZXBkcHBuZ3Nrd2ttaHlob2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTUwNzEsImV4cCI6MjA5NTQ5MTA3MX0.USRz4LrPf7bYf5eo6sP5Ay72OiwfcZ2ZpFKFi7lqKQI'
    );

    let teachers = [], classrooms = [], announcements = [];

    // ========== دوال الإعلانات ==========
    async function loadAnnouncements() {
        const { data, error } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false });
        if (error) console.error(error);
        announcements = data || [];
        renderAnnouncements();
    }
    function renderAnnouncements() {
        const container = document.getElementById('announcementsList');
        if (!announcements.length) { container.innerHTML = '<div>لا توجد إعلانات بعد. أضف إعلانك الأول!</div>'; return; }
        container.innerHTML = announcements.map(ann => `
            <div class="item">
                <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                    ${ann.image_url ? `<img src="${ann.image_url}" class="announcement-thumb" onerror="this.style.display='none'">` : '<i class="fas fa-image" style="color:#94a3b8;"></i>'}
                    <div>
                        <strong>${escapeHtml(ann.title)}</strong><br>
                        <small>${escapeHtml(ann.content.substring(0, 80))}${ann.content.length > 80 ? '…' : ''}</small><br>
                        <span class="badge ${!ann.is_visible ? 'badge-hidden' : ''}">${ann.is_visible ? 'مرئي' : 'مخفي'}</span>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="toggle-btn" onclick="toggleAnnouncementVisibility('${ann.id}', ${!ann.is_visible})">${ann.is_visible ? 'إخفاء' : 'إظهار'}</button>
                    <button class="delete-btn" onclick="deleteAnnouncement('${ann.id}')">حذف</button>
                </div>
            </div>
        `).join('');
    }
    window.toggleAnnouncementVisibility = async (id, newVisibility) => {
        const { error } = await supabaseClient.from('announcements').update({ is_visible: newVisibility }).eq('id', id);
        if (error) alert(error.message);
        else loadAnnouncements();
    };
    window.deleteAnnouncement = async (id) => {
        if (!confirm('هل أنت متأكد من حذف هذا الإعلان؟')) return;
        const { error } = await supabaseClient.from('announcements').delete().eq('id', id);
        if (error) alert(error.message);
        else loadAnnouncements();
    };
    async function addAnnouncement() {
        const title = document.getElementById('annTitle').value.trim();
        const content = document.getElementById('annContent').value.trim();
        const image_url = document.getElementById('annImageUrl').value.trim();
        const is_visible = document.getElementById('annIsVisible').checked;
        if (!title || !content) { alert('الرجاء كتابة العنوان والمحتوى'); return; }
        const { error } = await supabaseClient.from('announcements').insert([{ title, content, image_url: image_url || null, is_visible }]);
        if (error) alert(error.message);
        else {
            document.getElementById('annTitle').value = '';
            document.getElementById('annContent').value = '';
            document.getElementById('annImageUrl').value = '';
            document.getElementById('annIsVisible').checked = true;
            loadAnnouncements();
        }
    }
    async function uploadAnnouncementImage(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `ann_${Date.now()}.${fileExt}`;
        const { data, error } = await supabaseClient.storage.from('announcements-images').upload(fileName, file);
        if (error) throw error;
        const { data: { publicUrl } } = supabaseClient.storage.from('announcements-images').getPublicUrl(fileName);
        return publicUrl;
    }
    document.getElementById('uploadAnnImageBtn')?.addEventListener('click', () => {
        document.getElementById('annImageFile').click();
    });
    document.getElementById('annImageFile')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const url = await uploadAnnouncementImage(file);
            document.getElementById('annImageUrl').value = url;
            alert('تم رفع الصورة بنجاح! رابط الصورة جاهز.');
        } catch (err) {
            alert('فشل رفع الصورة: ' + err.message);
        }
        e.target.value = '';
    });

    // ========== دوال المدرسين والفصول والمحاضرات ==========
    async function loadTeachers() {
        const { data, error } = await supabaseClient.from('teachers').select('*').order('name');
        if (error) console.error(error);
        teachers = data || [];
        renderTeachers();
        renderTeacherSelects();
    }
    async function loadClassrooms() {
        const { data, error } = await supabaseClient.from('classrooms').select('*, teachers(name)').order('order_index');
        if (error) console.error(error);
        classrooms = data || [];
        renderClasses();
        filterClassesByTeacher();
    }
    async function loadLectures() {
        const { data, error } = await supabaseClient.from('lectures').select('*, teachers(name), classrooms(name)').order('created_at', { ascending: false });
        if (error) console.error(error);
        renderLectures(data || []);
    }

    function renderTeachers() {
        const container = document.getElementById('teachersList');
        if (!teachers.length) { container.innerHTML = '<div>لا يوجد مدرسون</div>'; return; }
        container.innerHTML = teachers.map(t => `
            <div class="item">
                <div style="display: flex; align-items: center; gap: 12px;">
                    ${t.avatar_url ? `<img src="${t.avatar_url}" class="teacher-avatar-preview" onerror="this.style.display='none'">` : '<i class="fas fa-chalkboard-user"></i>'}
                    <div><strong>${escapeHtml(t.name)}</strong><br><small>${escapeHtml(t.bio) || ''}</small></div>
                </div>
                <button class="delete-btn" onclick="deleteTeacher('${t.id}')">حذف</button>
            </div>
        `).join('');
    }
    function renderTeacherSelects() {
        const opts = `<option value="">اختر المدرس</option>` + teachers.map(t => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('');
        document.getElementById('teacherSelectForClass').innerHTML = opts;
        document.getElementById('teacherSelectForLecture').innerHTML = opts;
    }
    function renderClasses() {
        const container = document.getElementById('classesList');
        if (!classrooms.length) { container.innerHTML = '<div>لا توجد فصول</div>'; return; }
        container.innerHTML = classrooms.map(c => `
            <div class="item">
                <div><strong>${escapeHtml(c.name)}</strong> (المدرس: ${c.teachers?.name || '?'}) - ترتيب: ${c.order_index}</div>
                <button class="delete-btn" onclick="deleteClass('${c.id}')">حذف</button>
            </div>
        `).join('');
    }
    function renderLectures(lecturesData) {
        const container = document.getElementById('lecturesList');
        if (!lecturesData.length) { container.innerHTML = '<div>لا توجد محاضرات</div>'; return; }
        container.innerHTML = lecturesData.map(l => `
            <div class="item">
                <div><strong>${escapeHtml(l.title)}</strong><br>المدرس: ${l.teachers?.name || '-'} | الفصل: ${l.classrooms?.name || '-'}<br><a href="${l.youtube_url}" target="_blank">▶️ مشاهدة</a></div>
                <button class="delete-btn" onclick="deleteLecture('${l.id}')">حذف</button>
            </div>
        `).join('');
    }
    function filterClassesByTeacher() {
        const teacherId = document.getElementById('teacherSelectForLecture').value;
        const classSelect = document.getElementById('classSelectForLecture');
        if (!teacherId) { classSelect.innerHTML = '<option value="">اختر المدرس أولاً</option>'; return; }
        const filtered = classrooms.filter(c => c.teacher_id === teacherId);
        classSelect.innerHTML = filtered.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        if (!filtered.length) classSelect.innerHTML = '<option value="">لا توجد فصول</option>';
    }

    async function uploadTeacherAvatar(file) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const { data, error } = await supabaseClient.storage.from('teacher-avatars').upload(fileName, file);
        if (error) throw error;
        const { data: { publicUrl } } = supabaseClient.storage.from('teacher-avatars').getPublicUrl(fileName);
        return publicUrl;
    }
    window.addTeacherWithAvatar = async () => {
        const name = document.getElementById('teacherName').value.trim();
        if (!name) return alert('أدخل اسم المدرس');
        const bio = document.getElementById('teacherBio').value;
        const fileInput = document.getElementById('teacherAvatarFile');
        let avatarUrl = null;
        if (fileInput.files.length > 0) {
            try {
                avatarUrl = await uploadTeacherAvatar(fileInput.files[0]);
                alert('تم رفع صورة المدرس');
            } catch (err) { alert('فشل رفع الصورة: ' + err.message); return; }
        }
        const { error } = await supabaseClient.from('teachers').insert([{ name, bio, avatar_url: avatarUrl }]);
        if (error) alert(error.message);
        else {
            document.getElementById('teacherName').value = '';
            document.getElementById('teacherBio').value = '';
            document.getElementById('teacherAvatarFile').value = '';
            document.getElementById('avatarPreview').style.display = 'none';
            loadTeachers();
        }
    };
    window.addClass = async () => {
        const teacher_id = document.getElementById('teacherSelectForClass').value;
        const name = document.getElementById('className').value.trim();
        if (!teacher_id || !name) return alert('اختر المدرس واكتب اسم الفصل');
        const order_index = parseInt(document.getElementById('classOrder').value) || 0;
        const { error } = await supabaseClient.from('classrooms').insert([{ teacher_id, name, order_index }]);
        if (error) alert(error.message);
        else { document.getElementById('className').value = ''; loadClassrooms(); }
    };
    window.addLectureAdvanced = async () => {
        const teacher_id = document.getElementById('teacherSelectForLecture').value;
        const classroom_id = document.getElementById('classSelectForLecture').value;
        const title = document.getElementById('lectureTitle').value.trim();
        const youtube_url = document.getElementById('lectureUrl').value.trim();
        if (!teacher_id || !classroom_id || !title || !youtube_url) return alert('املأ جميع الحقول');
        const { error } = await supabaseClient.from('lectures').insert([{ teacher_id, classroom_id, title, youtube_url }]);
        if (error) alert(error.message);
        else { document.getElementById('lectureTitle').value = ''; document.getElementById('lectureUrl').value = ''; loadLectures(); }
    };

    // ========== دوال الحذف المعدلة (الجزء الأهم) ==========
    window.deleteTeacher = async (id) => {
        if (!confirm('سيتم حذف جميع فصوله ومحاضراته. هل أنت متأكد؟')) return;
        const { error } = await supabaseClient.from('teachers').delete().eq('id', id);
        if (error) {
            alert('فشل حذف المدرس: ' + error.message);
            console.error(error);
        } else {
            loadTeachers();
            loadClassrooms();
            loadLectures();
        }
    };
    window.deleteClass = async (id) => {
        if (!confirm('هل تريد حذف هذا الفصل؟')) return;
        const { error } = await supabaseClient.from('classrooms').delete().eq('id', id);
        if (error) {
            alert('فشل حذف الفصل: ' + error.message);
            console.error(error);
        } else {
            loadClassrooms();
            loadLectures();  // لأن المحاضرات المرتبطة بالفصل قد تُحذف (cascade) أو تبقى، نحدّث كليهما
        }
    };
    window.deleteLecture = async (id) => {
        if (!confirm('هل تريد حذف هذه المحاضرة؟')) return;
        const { error } = await supabaseClient.from('lectures').delete().eq('id', id);
        if (error) {
            alert('فشل حذف المحاضرة: ' + error.message);
            console.error(error);
        } else {
            loadLectures();
        }
    };

    // معاينة صورة المدرس
    document.getElementById('teacherAvatarFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const preview = document.getElementById('avatarPreview');
                preview.src = ev.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // ربط الأزرار
    document.getElementById('addAnnouncementBtn').onclick = addAnnouncement;
    document.getElementById('addTeacherBtn').onclick = addTeacherWithAvatar;
    document.getElementById('addClassBtn').onclick = addClass;
    document.getElementById('addLectureBtn').onclick = addLectureAdvanced;
    document.getElementById('teacherSelectForLecture').onchange = filterClassesByTeacher;

    // تحميل كل البيانات
    loadAnnouncements();
    loadTeachers();
    loadClassrooms();
    loadLectures();

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
