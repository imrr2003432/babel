<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>وزاريات السادس العلمي | روابط يدوية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f3e8ff 0%, #ffffff 100%);
      font-family: 'Cairo', sans-serif;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    /* الهيدر */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .badge {
      background: #8b5cf6;
      color: white;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.25);
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(135deg, #6d28d9, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .subhead {
      font-size: clamp(0.9rem, 4vw, 1.2rem);
      color: #4c1d95;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 4px 16px;
      border-radius: 30px;
    }

    /* شبكة البطاقات المتجاوبة */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin: 28px 0 20px;
    }

    /* البطاقة */
    .card {
      background: white;
      border-radius: 28px;
      padding: 24px 16px;
      transition: all 0.25s ease;
      border: 1px solid #ede9fe;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #c084fc;
      box-shadow: 0 20px 30px -12px rgba(139, 92, 246, 0.2);
    }

    /* أيقونة دائرية */
    .card-icon {
      background: #f5f0ff;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 2.2rem;
      color: #7e22ce;
      margin-bottom: 16px;
      transition: 0.2s;
    }

    .card h3 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #3b0764;
      margin-bottom: 20px;
      word-break: keep-all;
    }

    /* زر التلغرام */
    .btn-telegram {
      background: linear-gradient(95deg, #6d28d9, #a855f7);
      border: none;
      color: white;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 0;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 6px 14px rgba(107, 33, 168, 0.25);
    }

    .btn-telegram:active {
      transform: scale(0.97);
    }

    /* تذييل الحقوق */
    .footer-copyright {
      text-align: center;
      margin-top: 40px;
      padding: 16px;
      font-size: 0.85rem;
      color: #6b21a5;
      border-top: 1px solid #e9d5ff;
      background: transparent;
    }

    /* تحسينات مخصصة للهواتف الصغيرة */
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .badge {
        font-size: 11px;
        padding: 4px 12px;
      }

      .subjects-grid {
        gap: 16px;
        grid-template-columns: 1fr; /* عمود واحد في الهواتف الصغيرة */
      }

      .card {
        padding: 20px 12px;
        border-radius: 24px;
      }

      .card-icon {
        width: 70px;
        height: 70px;
        font-size: 2rem;
      }

      .card h3 {
        font-size: 1.4rem;
        margin-bottom: 16px;
      }

      .btn-telegram {
        padding: 12px 0;
        font-size: 0.9rem;
      }

      .footer-copyright {
        margin-top: 30px;
        font-size: 0.75rem;
      }
    }

    /* للشاشات المتوسطة (تابلت) */
    @media (min-width: 641px) and (max-width: 900px) {
      .subjects-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }
    }

    /* للشاشات الكبيرة */
    @media (min-width: 1200px) {
      .subjects-grid {
        gap: 28px;
      }
      .card {
        padding: 28px 20px;
      }
    }

    /* تحسين اللمس على الهواتف */
    @media (hover: none) and (pointer: coarse) {
      .btn-telegram {
        padding: 14px 0;
      }
      .card:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="badge"><i class="fas fa-graduation-cap"></i> السادس العلمي – العراق</div>
    <h1><i class="fas fa-file-alt"></i> الأسئلة الوزارية</h1>
    <div class="subhead">جميع المواد · جميع الفصول</div>
  </div>
  <div class="subjects-grid" id="subjectsGrid"></div>
</div>
<div class="footer-copyright">
  <i class="fas fa-copyright"></i> جميع الحقوق محفوظة لـ عمران
</div>

<script>
  // ============================================================
  // 🔹 قم بتعديل الروابط التالية يدوياً 🔹
  // ضع رابط Telegram الخاص بكل مادة
  // ============================================================
  const telegramLinks = {
    الرياضيات: "https://t.me/c/3984623664/15/16",
    الاحياء: "https://t.me/c/3984623664/3/4",
    الكيمياء: "https://t.me/c/3984623664/1/13",
    الفيزياء: "https://t.me/c/3984623664/5/6",
    العربية: "https://t.me/c/3984623664/7/8",
    الانكليزي: "https://t.me/c/3984623664/9/10",
    الاسلامية: "https://t.me/c/3984623664/11/12"
  };
  // ============================================================

  const subjects = [
    { name: "الرياضيات", icon: "fas fa-calculator" },
    { name: "الاحياء", icon: "fas fa-dna" },
    { name: "الكيمياء", icon: "fas fa-flask" },
    { name: "الفيزياء", icon: "fas fa-atom" },
    { name: "اللغة العربية", icon: "fas fa-book-open" },
    { name: "اللغة الانكليزية", icon: "fas fa-language" },
    { name: "التربية الإسلامية", icon: "fas fa-mosque" }
  ];

  const container = document.getElementById("subjectsGrid");

  subjects.forEach(sub => {
    const card = document.createElement("div");
    card.className = "card";

    const iconDiv = document.createElement("div");
    iconDiv.className = "card-icon";
    iconDiv.innerHTML = `<i class="${sub.icon}"></i>`;
    card.appendChild(iconDiv);

    const title = document.createElement("h3");
    title.textContent = sub.name;
    card.appendChild(title);

    const btn = document.createElement("button");
    btn.className = "btn-telegram";
    btn.innerHTML = '<i class="fab fa-telegram-plane"></i> عرض الأسئلة على تلغرام';
    
    let linkKey = sub.name;
    if (sub.name === "التربية الإسلامية") linkKey = "الاسلامية";
    const link = telegramLinks[linkKey] || "#";
    
    btn.addEventListener("click", () => {
      if (link && link !== "#") {
        window.open(link, "_blank");
      } else {
        alert("لم يتم تعيين رابط لهذه المادة بعد. الرجاء إضافة الرابط في الكود.");
      }
    });
    card.appendChild(btn);
    container.appendChild(card);
  });
</script>
</body>
</html>
