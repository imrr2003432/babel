<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ديموفر | المكتبة التعليمية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Cairo', 'sans-serif'] }, 
                    colors: { primary: '#2563eb', secondary: '#f97316' } 
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; transition: background-color 0.3s, color 0.3s; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .teacher-card {
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .teacher-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px -12px rgba(37, 99, 235, 0.2);
            border-color: #2563eb;
        }
        
        .class-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .class-item:hover {
            transform: translateX(-6px);
            border-right-width: 8px;
            border-color: #2563eb;
            background: #eff6ff;
        }
        
        .lecture-item {
            transition: all 0.2s ease;
        }
        .lecture-item.completed {
            background: #f0fdf4;
            border-right: 4px solid #22c55e;
        }
        .lecture-item:hover {
            background: #f8fafc;
        }
        .lecture-item.completed:hover {
            background: #dcfce7;
        }
        
        .play-btn {
            transition: all 0.2s ease;
        }
        .play-btn:hover {
            transform: scale(1.05);
            background: #2563eb;
            color: white;
        }
        
        .watch-toggle {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .watch-toggle:hover {
            transform: scale(1.15);
        }
        .watch-toggle.completed {
            color: #22c55e;
        }
        
        .search-box {
            transition: all 0.25s ease;
        }
        .search-box:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .back-btn {
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateX(-4px);
        }
        
        .progress-stats {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
        }
        
        .video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .video-modal.open {
            display: flex;
        }
        .video-container {
            background: #000;
            width: 90%;
            max-width: 1000px;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 2px solid #2563eb;
        }
        .video-container iframe {
            width: 100%;
            height: 520px;
            border: none;
        }
        .close-video {
            position: absolute;
            top: -3rem;
            left: 0;
            background: #2563eb;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: none;
        }
        .close-video:hover {
            background: #1d4ed8;
            transform: scale(0.95);
        }
        
        @media (max-width: 640px) {
            .video-container iframe { height: 220px; }
            .close-video { top: -2.5rem; font-size: 0.8rem; padding: 0.3rem 1rem; }
        }

        /* ========================================================= */
        /*                الوضع الليلي (Dark Mode)                     */
        /* ========================================================= */
        body.dark-mode {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }
        body.dark-mode .bg-white { background-color: #1e293b !important; }
        body.dark-mode .bg-slate-50 { background-color: #0f172a !important; }
        body.dark-mode .bg-slate-100 { background-color: #334155 !important; }
        body.dark-mode .bg-primary\/10 { background-color: rgba(37, 99, 235, 0.25) !important; }
        body.dark-mode .bg-primary\/5 { background-color: rgba(37, 99, 235, 0.2) !important; }
        body.dark-mode .bg-red-50 { background-color: rgba(239, 68, 68, 0.15) !important; }
        body.dark-mode .bg-yellow-50 { background-color: rgba(234, 179, 8, 0.15) !important; }
        body.dark-mode .bg-green-50 { background-color: rgba(34, 197, 94, 0.15) !important; }

        body.dark-mode .text-slate-800 { color: #f8fafc !important; }
        body.dark-mode .text-slate-700 { color: #e2e8f0 !important; }
        body.dark-mode .text-slate-600 { color: #cbd5e1 !important; }
        body.dark-mode .text-slate-500 { color: #94a3b8 !important; }
        body.dark-mode .text-slate-400 { color: #64748b !important; }
        body.dark-mode .text-slate-300 { color: #475569 !important; }

        body.dark-mode .border-gray-100,
        body.dark-mode .border-gray-200 { border-color: #334155 !important; }
        body.dark-mode .border-primary\/40 { border-color: rgba(37, 99, 235, 0.3) !important; }

        body.dark-mode .teacher-card { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .teacher-card:hover { border-color: #3b82f6 !important; }

        body.dark-mode .class-item { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .class-item:hover { background-color: #1e3a8a !important; border-color: #3b82f6 !important; }

        body.dark-mode .lecture-item { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .lecture-item:hover { background-color: #334155 !important; }
        body.dark-mode .lecture-item.completed { background-color: #0f3a1e !important; border-color: #22c55e !important; }
        body.dark-mode .lecture-item.completed:hover { background-color: #1a4a2a !important; }

        body.dark-mode .search-box { background-color: #1e293b !important; border-color: #334155 !important; }
        body.dark-mode .search-box input { color: #f8fafc !important; }
        body.dark-mode .search-box:focus-within { border-color: #3b82f6 !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2) !important; }

        body.dark-mode .back-btn { background-color: #1e293b !important; border-color: #334155 !important; color: #94a3b8 !important; }
        body.dark-mode .back-btn:hover { background-color: #1e3a8a !important; border-color: #3b82f6 !important; color: #60a5fa !important; }

        body.dark-mode .progress-stats { background-color: #1e3a8a !important; border-color: #2563eb !important; color: #93c5fd !important; }

        body.dark-mode .play-btn { background-color: rgba(37, 99, 235, 0.2) !important; color: #60a5fa !important; }
        body.dark-mode .play-btn:hover { background-color: #2563eb !important; color: white !important; }

        body.dark-mode .watch-toggle { color: #64748b !important; }
        body.dark-mode .watch-toggle.completed { color: #22c55e !important; }

        body.dark-mode .video-container { border-color: #3b82f6 !important; }
        body.dark-mode .close-video { background-color: #1e3a8a !important; }
        body.dark-mode .close-video:hover { background-color: #2563eb !important; }

        body.dark-mode .bg-slate-50\/50 { background-color: #1e293b !important; }
        body.dark-mode .bg-slate-100\/50 { background-color: #334155 !important; }
        body.dark-mode .bg-slate-200 { background-color: #334155 !important; }
        body.dark-mode .bg-slate-300 { background-color: #475569 !important; }
        body.dark-mode .bg-slate-400 { background-color: #64748b !important; }
        body.dark-mode .bg-slate-500 { background-color: #94a3b8 !important; }
        body.dark-mode .bg-slate-600 { background-color: #475569 !important; }
        body.dark-mode .bg-slate-700 { background-color: #334155 !important; }
        body.dark-mode .bg-slate-800 { background-color: #1e293b !important; }
        body.dark-mode .bg-slate-900 { background-color: #0f172a !important; }

        body.dark-mode .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.4) !important; }
        body.dark-mode .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5) !important; }
        body.dark-mode .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.6) !important; }
        body.dark-mode .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7) !important; }

        body.dark-mode .border-l { border-left-color: #334155 !important; }
        body.dark-mode .border-r { border-right-color: #334155 !important; }
        body.dark-mode .border-t { border-top-color: #334155 !important; }
        body.dark-mode .border-b { border-bottom-color: #334155 !important; }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    
    <!-- شريط الحالة -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 flex flex-wrap items-center justify-between gap-4 mb-6 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                <i class="fas fa-graduation-cap text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">المكتبة التعليمية</h1>
                <p class="text-sm text-slate-500">اكتشف دروسك من كبار المعلمين</p>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-full border border-gray-200">
                <i class="fas fa-coins text-yellow-500"></i>
                <span class="font-bold text-slate-700" id="userPoints">0 نقطة</span>
            </div>
            <div class="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-full border border-gray-200">
                <i class="fas fa-chart-line text-primary"></i>
                <span class="font-bold text-slate-700" id="userLevel">مبتدئ</span>
            </div>
            <!-- زر تبديل الوضع -->
            <button id="themeToggleBtn" class="p-2 rounded-full text-slate-500 hover:text-primary hover:bg-slate-100 transition" title="تبديل الوضع">
                <i class="fas fa-moon text-lg"></i>
            </button>
            <a href="dashbord.html" class="bg-slate-50 hover:bg-slate-100 text-slate-600 hover:text-primary px-4 py-2 rounded-full font-semibold transition border border-gray-200 flex items-center gap-2">
                <i class="fas fa-arrow-right"></i> لوحة التحكم
            </a>
        </div>
    </div>

    <!-- شريط البحث -->
    <div id="searchWrapper" class="mb-6 flex justify-center" style="display: none;">
        <div class="search-box bg-white rounded-full border border-gray-200 px-6 py-2 flex items-center gap-3 w-full max-w-md shadow-sm">
            <i class="fas fa-search text-slate-400"></i>
            <input type="text" id="teacherSearchInput" placeholder="ابحث عن مدرس بالاسم أو التخصص..." class="flex-1 py-3 outline-none bg-transparent font-cairo text-slate-700" autocomplete="off">
        </div>
    </div>

    <!-- منطقة المحتوى الرئيسية -->
    <div id="contentArea" class="min-h-[300px]">
        <div class="text-center py-16 text-slate-500">
            <i class="fas fa-spinner fa-pulse text-3xl text-primary"></i>
            <p class="mt-4 font-semibold">جاري تحميل المحتوى...</p>
        </div>
    </div>

    <!-- إحصائيات التقدم -->
    <div id="progressArea" class="mt-6 text-center"></div>

    <!-- تذييل -->
    <div class="mt-8 text-center text-sm text-slate-400 border-t border-gray-200 pt-6">
        <i class="fas fa-check-circle text-primary ml-1"></i> أكمل المحاضرة بالضغط على زر الدائرة — كل مشاهدة تمنحك 10 نقاط وخبرة
    </div>
</div>

<!-- مودال الفيديو -->
<div id="videoModal" class="video-modal" onclick="closeVideo()">
    <div class="video-container" onclick="event.stopPropagation()">
        <button class="close-video" onclick="closeVideo()"><i class="fas fa-times ml-2"></i>إغلاق</button>
        <iframe id="videoIframe" allowfullscreen></iframe>
    </div>
</div>

<script>
    // ============================================================
    //  إعدادات Supabase
    // ============================================================
    const SUPABASE_URL = 'https://kuepdppngskwkmhyhohq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1ZXBkcHBuZ3Nrd2ttaHlob2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTUwNzEsImV4cCI6MjA5NTQ5MTA3MX0.USRz4LrPf7bYf5eo6sP5Ay72OiwfcZ2ZpFKFi7lqKQI';
    
    if (typeof supabase === 'undefined') {
        document.getElementById('contentArea').innerHTML = '<div class="text-center text-red-500 py-10">خطأ في تحميل مكتبة Supabase</div>';
        throw new Error('Supabase not loaded');
    }
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ============================================================
    //  المتغيرات العامة
    // ============================================================
    let currentUserId = null;
    let currentTeacherId = null;
    let currentClassroomId = null;
    let allTeachersData = [];
    let watchedMap = new Map(); // lecture_id -> boolean (completed)
    let currentFilterText = '';

    // ============================================================
    //  دوال مساعدة
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ============================================================
    //  التعامل مع الحضور (watched)
    // ============================================================
    async function loadWatchedFromSupabase() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        currentUserId = user.id;
        
        const { data: attendance, error } = await sb
            .from('attendance')
            .select('lecture_id, completed')
            .eq('student_id', currentUserId);
        
        if (error) {
            console.error('خطأ في تحميل الحضور:', error);
            return;
        }
        
        watchedMap.clear();
        attendance.forEach(rec => {
            if (rec.completed) watchedMap.set(rec.lecture_id, true);
        });
        
        // تحديث واجهة المحاضرات إن كانت معروضة
        updateLecturesUI();
    }

    // تحديث واجهة المحاضرات بناءً على watchedMap
    function updateLecturesUI() {
        document.querySelectorAll('.lecture-item').forEach(el => {
            const lecId = el.getAttribute('data-lecture-id');
            const isCompleted = watchedMap.get(lecId) === true;
            
            if (isCompleted) {
                el.classList.add('completed');
                const btn = el.querySelector('.watch-toggle');
                if (btn) {
                    btn.classList.add('completed');
                    btn.innerHTML = '<i class="fas fa-check-circle text-lg"></i>';
                }
            } else {
                el.classList.remove('completed');
                const btn = el.querySelector('.watch-toggle');
                if (btn) {
                    btn.classList.remove('completed');
                    btn.innerHTML = '<i class="fas fa-circle text-lg text-slate-300"></i>';
                }
            }
        });
        updateProgressStats();
    }

    // تحديث إحصائيات التقدم
    function updateProgressStats() {
        const container = document.getElementById('progressArea');
        const items = document.querySelectorAll('.lecture-item');
        const total = items.length;
        let completed = 0;
        items.forEach(el => {
            const lecId = el.getAttribute('data-lecture-id');
            if (watchedMap.get(lecId) === true) completed++;
        });
        
        if (total === 0) {
            container.innerHTML = '';
            return;
        }
        
        const percent = Math.round((completed / total) * 100);
        container.innerHTML = `
            <div class="progress-stats inline-block px-6 py-3 rounded-full font-bold text-sm">
                <i class="fas fa-chart-line text-primary ml-2"></i>
                نسبة الإنجاز: ${completed}/${total} (${percent}%)
                <i class="fas fa-check-circle text-green-500 mr-2"></i>
            </div>
        `;
    }

    // ============================================================
    //  تحديث نقاط المستوى
    // ============================================================
    async function loadUserData() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        
        const { data: profile } = await sb
            .from('profiles')
            .select('points, level')
            .eq('id', user.id)
            .single();
        
        if (profile) {
            const points = profile.points || 0;
            document.getElementById('userPoints').innerText = `${points} نقطة`;
            
            let levelText = '🌱 مبتدئ';
            if (points >= 200) levelText = '🏆 خبير';
            else if (points >= 100) levelText = '🥇 متقدم';
            else if (points >= 50) levelText = '🥈 متوسط';
            document.getElementById('userLevel').innerHTML = `<i class="fas fa-crown ml-1"></i> ${levelText}`;
        }
    }

    async function addPoints(userId, pointsToAdd) {
        const { data: profile } = await sb
            .from('profiles')
            .select('points')
            .eq('id', userId)
            .single();
        
        const newPoints = (profile?.points || 0) + pointsToAdd;
        let level = 'مبتدئ';
        if (newPoints >= 200) level = 'خبير';
        else if (newPoints >= 100) level = 'متقدم';
        else if (newPoints >= 50) level = 'متوسط';
        
        await sb
            .from('profiles')
            .update({ points: newPoints, level })
            .eq('id', userId);
        
        await loadUserData();
    }

    // ============================================================
    //  تبديل حالة المشاهدة (يدوي)
    // ============================================================
    window.toggleWatchedManual = async function(lectureId) {
        if (!currentUserId) {
            alert('الرجاء تسجيل الدخول أولاً');
            return;
        }
        
        const currentlyCompleted = watchedMap.get(lectureId) === true;
        
        try {
            if (!currentlyCompleted) {
                // تحديد كمشاهدة
                const { data: existing } = await sb
                    .from('attendance')
                    .select('id')
                    .eq('student_id', currentUserId)
                    .eq('lecture_id', lectureId)
                    .maybeSingle();
                
                if (existing) {
                    await sb
                        .from('attendance')
                        .update({ completed: true, watched_at: new Date(), watched_percentage: 100 })
                        .eq('id', existing.id);
                } else {
                    await sb
                        .from('attendance')
                        .insert({
                            student_id: currentUserId,
                            lecture_id: lectureId,
                            completed: true,
                            watched_at: new Date(),
                            watched_percentage: 100,
                            points_earned: 10
                        });
                    await addPoints(currentUserId, 10);
                }
                watchedMap.set(lectureId, true);
            } else {
                // إلغاء التحديد
                const { data: existing } = await sb
                    .from('attendance')
                    .select('id')
                    .eq('student_id', currentUserId)
                    .eq('lecture_id', lectureId)
                    .maybeSingle();
                
                if (existing) {
                    await sb
                        .from('attendance')
                        .update({ completed: false, points_earned: 0 })
                        .eq('id', existing.id);
                }
                watchedMap.set(lectureId, false);
            }
            
            updateLecturesUI();
            await loadUserData();
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء حفظ العلامة');
        }
    };

    // ============================================================
    //  تشغيل الفيديو
    // ============================================================
    window.playLecture = function(url) {
        if (!url) {
            alert('رابط الفيديو غير موجود');
            return;
        }
        
        const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
        const videoId = match ? match[1] : null;
        
        if (!videoId) {
            alert('لم نتمكن من استخراج معرف الفيديو. تأكد من أن الرابط صحيح من يوتيوب.');
            return;
        }
        
        const iframe = document.getElementById('videoIframe');
        iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
        document.getElementById('videoModal').classList.add('open');
    };

    window.closeVideo = function() {
        const modal = document.getElementById('videoModal');
        const iframe = document.getElementById('videoIframe');
        iframe.src = '';
        modal.classList.remove('open');
    };

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeVideo();
    });

    // ============================================================
    //  عرض المدرسين (شبكة)
    // ============================================================
    function renderTeachersGrid() {
        const container = document.getElementById('teachersGridContainer');
        if (!container) {
            // إذا لم توجد الحاوية، نعيد إنشائها
            document.getElementById('contentArea').innerHTML = `<div id="teachersGridContainer"></div>`;
            return renderTeachersGrid();
        }
        
        let filtered = [...allTeachersData];
        if (currentFilterText.trim() !== '') {
            const lower = currentFilterText.toLowerCase();
            filtered = filtered.filter(t =>
                (t.name && t.name.toLowerCase().includes(lower)) ||
                (t.bio && t.bio.toLowerCase().includes(lower))
            );
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12 text-slate-500 bg-white rounded-2xl border border-gray-100">
                    <i class="fas fa-search text-4xl text-slate-300 block mb-4"></i>
                    <p class="font-semibold">لا يوجد مدرسون مطابقون لـ "${escapeHtml(currentFilterText)}"</p>
                </div>
            `;
            return;
        }
        
        let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">`;
        filtered.forEach(t => {
            const avatarHtml = t.avatar_url
                ? `<img src="${escapeHtml(t.avatar_url)}" alt="${escapeHtml(t.name)}" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center text-5xl text-primary/30"><i class="fas fa-user-graduate"></i></div>`;
            
            html += `
                <div class="teacher-card bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-md text-center" onclick="selectTeacher('${t.id}')">
                    <div class="w-24 h-24 mx-auto rounded-full overflow-hidden border-2 border-primary/20 bg-slate-50 mb-4">
                        ${avatarHtml}
                    </div>
                    <h3 class="font-bold text-lg text-slate-800">${escapeHtml(t.name)}</h3>
                    <p class="text-sm text-slate-500 mt-1">${escapeHtml(t.bio) || 'متميز في التدريس'}</p>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // ============================================================
    //  تحميل المدرسين
    // ============================================================
    async function loadTeachers() {
        currentTeacherId = null;
        currentClassroomId = null;
        
        const { data: teachers, error } = await sb
            .from('teachers')
            .select('*')
            .order('name');
        
        if (error || !teachers || teachers.length === 0) {
            document.getElementById('contentArea').innerHTML = `
                <div class="text-center py-16 bg-white rounded-2xl border border-gray-100">
                    <i class="fas fa-chalkboard-user text-5xl text-slate-300 block mb-4"></i>
                    <p class="text-slate-500 font-semibold">لا يوجد مدرسون حالياً</p>
                </div>
            `;
            document.getElementById('searchWrapper').style.display = 'none';
            return;
        }
        
        allTeachersData = teachers;
        currentFilterText = '';
        
        // إظهار شريط البحث
        document.getElementById('searchWrapper').style.display = 'flex';
        
        // إنشاء حاوية الشبكة
        document.getElementById('contentArea').innerHTML = `<div id="teachersGridContainer"></div>`;
        
        // عرض الشبكة
        renderTeachersGrid();
        
        // ربط حدث البحث
        const searchInput = document.getElementById('teacherSearchInput');
        if (searchInput) {
            searchInput.removeEventListener('input', handleSearch);
            searchInput.addEventListener('input', handleSearch);
            searchInput.value = '';
        }
        
        document.getElementById('progressArea').innerHTML = '';
    }

    function handleSearch() {
        const input = document.getElementById('teacherSearchInput');
        currentFilterText = input ? input.value : '';
        renderTeachersGrid();
    }

    // ============================================================
    //  اختيار مدرس -> عرض الفصول
    // ============================================================
    window.selectTeacher = async function(teacherId) {
        currentTeacherId = teacherId;
        document.getElementById('searchWrapper').style.display = 'none';
        
        const { data: classrooms, error } = await sb
            .from('classrooms')
            .select('*')
            .eq('teacher_id', teacherId)
            .order('order_index');
        
        if (error || !classrooms || classrooms.length === 0) {
            document.getElementById('contentArea').innerHTML = `
                <div class="mb-4">
                    <button class="back-btn bg-white hover:bg-slate-50 border border-gray-200 px-5 py-2.5 rounded-xl font-semibold text-slate-600 hover:text-primary flex items-center gap-2 transition" onclick="backToTeachers()">
                        <i class="fas fa-arrow-right"></i> العودة للمدرسين
                    </button>
                </div>
                <div class="text-center py-16 bg-white rounded-2xl border border-gray-100">
                    <i class="fas fa-folder-open text-4xl text-slate-300 block mb-4"></i>
                    <p class="text-slate-500 font-semibold">لا توجد فصول لهذا المدرس</p>
                </div>
            `;
            return;
        }
        
        let html = `
            <div class="mb-4">
                <button class="back-btn bg-white hover:bg-slate-50 border border-gray-200 px-5 py-2.5 rounded-xl font-semibold text-slate-600 hover:text-primary flex items-center gap-2 transition" onclick="backToTeachers()">
                    <i class="fas fa-arrow-right"></i> العودة للمدرسين
                </button>
            </div>
            <div class="space-y-3 max-w-2xl">
        `;
        
        classrooms.forEach(cls => {
            html += `
                <div class="class-item bg-white rounded-xl border-r-4 border-primary/40 border border-gray-100 p-4 flex items-center justify-between shadow-sm hover:shadow" onclick="selectClass('${cls.id}')">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-layer-group text-primary"></i>
                        <span class="font-bold text-slate-700">${escapeHtml(cls.name)}</span>
                    </div>
                    <i class="fas fa-chevron-left text-slate-400"></i>
                </div>
            `;
        });
        
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('progressArea').innerHTML = '';
    };

    // ============================================================
    //  العودة للمدرسين
    // ============================================================
    window.backToTeachers = function() {
        document.getElementById('searchWrapper').style.display = 'flex';
        // نعيد بناء الشبكة مع الحفاظ على حالة الفلترة
        renderTeachersGrid();
        document.getElementById('progressArea').innerHTML = '';
    };

    // ============================================================
    //  اختيار فصل -> عرض المحاضرات
    // ============================================================
    window.selectClass = async function(classroomId) {
        currentClassroomId = classroomId;
        
        const { data: lectures, error } = await sb
            .from('lectures')
            .select('*')
            .eq('classroom_id', classroomId)
            .order('created_at', { ascending: true });
        
        if (error || !lectures || lectures.length === 0) {
            document.getElementById('contentArea').innerHTML = `
                <div class="mb-4">
                    <button class="back-btn bg-white hover:bg-slate-50 border border-gray-200 px-5 py-2.5 rounded-xl font-semibold text-slate-600 hover:text-primary flex items-center gap-2 transition" onclick="selectTeacher('${currentTeacherId}')">
                        <i class="fas fa-arrow-right"></i> العودة للفصول
                    </button>
                </div>
                <div class="text-center py-16 bg-white rounded-2xl border border-gray-100">
                    <i class="fas fa-video-slash text-4xl text-slate-300 block mb-4"></i>
                    <p class="text-slate-500 font-semibold">لا توجد محاضرات في هذا الفصل بعد</p>
                </div>
            `;
            document.getElementById('progressArea').innerHTML = '';
            return;
        }
        
        let html = `
            <div class="mb-4">
                <button class="back-btn bg-white hover:bg-slate-50 border border-gray-200 px-5 py-2.5 rounded-xl font-semibold text-slate-600 hover:text-primary flex items-center gap-2 transition" onclick="selectTeacher('${currentTeacherId}')">
                    <i class="fas fa-arrow-right"></i> العودة للفصول
                </button>
            </div>
            <div class="space-y-3 max-w-3xl">
        `;
        
        lectures.forEach(lec => {
            const lecId = lec.id;
            const isCompleted = watchedMap.get(lecId) === true;
            const completedClass = isCompleted ? 'completed' : '';
            const videoUrl = lec.youtube_url || '';
            
            html += `
                <div class="lecture-item ${completedClass} bg-white rounded-xl border border-gray-100 p-4 flex flex-wrap items-center justify-between gap-3 shadow-sm" data-lecture-id="${lecId}">
                    <div class="flex items-center gap-3 flex-1 min-w-[200px] cursor-pointer" onclick='playLecture(${JSON.stringify(videoUrl)})'>
                        <div class="play-btn w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center hover:bg-primary hover:text-white transition">
                            <i class="fas fa-play text-sm"></i>
                        </div>
                        <span class="font-semibold text-slate-700">${escapeHtml(lec.title)}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-primary/60 bg-primary/5 px-3 py-1 rounded-full"><i class="fas fa-gem ml-1"></i> +10</span>
                        <button class="watch-toggle ${isCompleted ? 'completed' : ''} text-slate-300 hover:text-primary transition" onclick="toggleWatchedManual('${lecId}')" title="تحديد كمشاهدة / إلغاء">
                            <i class="fas ${isCompleted ? 'fa-check-circle' : 'fa-circle'} text-lg"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        
        html += `</div>`;
        document.getElementById('contentArea').innerHTML = html;
        
        // ✅ تحديث الواجهة بعد إضافة العناصر
        updateLecturesUI();
        updateProgressStats();
    };

    // ============================================================
    //  تبديل الوضع الليلي/النهاري
    // ============================================================
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeIcon = themeToggleBtn.querySelector('i');

    // تحميل التفضيل المحفوظ
    const savedTheme = localStorage.getItem('dashbord-theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        themeIcon.className = 'fas fa-sun';
    }

    themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('dashbord-theme', isDark ? 'dark' : 'light');
        themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    });

    // ============================================================
    //  بدء التشغيل
    // ============================================================
    (async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = 'index.html';
            return;
        }
        
        // تحميل الحضور أولاً
        await loadWatchedFromSupabase();
        // ثم تحميل المدرسين
        await loadTeachers();
        // ثم تحميل بيانات المستخدم
        await loadUserData();
    })();
</script>

</body>
</html>
